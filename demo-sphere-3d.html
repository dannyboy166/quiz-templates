<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Sphere - Three.js</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #FFE5B4 0%, #FFB6C1 50%, #E6E6FA 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    h1 {
      position: absolute;
      top: 20px;
      color: #333;
      z-index: 10;
    }

    #canvas-container {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      display: block;
    }

    /* Title card */
    .title-card {
      position: absolute;
      bottom: 100px;
      left: 30px;
      background: white;
      padding: 16px 24px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      text-align: left;
      z-index: 10;
    }

    .title-card h2 {
      font-size: 22px;
      color: #333;
      margin-bottom: 4px;
    }

    .title-card p {
      color: #666;
      font-size: 13px;
    }

    /* Controls */
    .controls {
      position: absolute;
      bottom: 30px;
      left: 30px;
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    .control-btn {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border: 2px solid #333;
      border-radius: 25px;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
    }

    .control-btn:hover {
      background: #333;
      color: white;
    }

    /* Clouds */
    .cloud {
      position: fixed;
      background: white;
      border-radius: 50px;
      opacity: 0.7;
      pointer-events: none;
      z-index: 1;
    }

    .cloud::before {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }

    .cloud-1 {
      width: 100px;
      height: 40px;
      top: 15%;
      left: 10%;
    }

    .cloud-1::before {
      width: 50px;
      height: 50px;
      top: -25px;
      left: 15px;
    }

    .cloud-2 {
      width: 120px;
      height: 50px;
      top: 20%;
      right: 15%;
    }

    .cloud-2::before {
      width: 60px;
      height: 60px;
      top: -30px;
      left: 20px;
    }

    /* Loading */
    .loading {
      position: absolute;
      color: #333;
      font-size: 18px;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">Loading 3D sphere...</div>

  <div id="canvas-container"></div>

  <div class="title-card">
    <h2>Animal Lifecycles</h2>
    <p>Drag to rotate the sphere</p>
  </div>

  <div class="controls">
    <button class="control-btn" onclick="toggleAutoRotate()">⏯️ Auto-Rotate</button>
    <button class="control-btn" onclick="resetView()">🔄 Reset View</button>
  </div>

  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- OrbitControls for drag interaction -->
  <script>
    // Simple OrbitControls implementation
    class SimpleOrbitControls {
      constructor(camera, domElement) {
        this.camera = camera;
        this.domElement = domElement;
        this.autoRotate = true;
        this.autoRotateSpeed = 1.0;

        this.rotationX = 0;
        this.rotationY = 0;
        this.targetRotationX = 0;
        this.targetRotationY = 0;

        this.isDragging = false;
        this.previousMouseX = 0;
        this.previousMouseY = 0;

        this.setupEventListeners();
      }

      setupEventListeners() {
        this.domElement.addEventListener('mousedown', (e) => this.onMouseDown(e));
        this.domElement.addEventListener('mousemove', (e) => this.onMouseMove(e));
        this.domElement.addEventListener('mouseup', () => this.onMouseUp());
        this.domElement.addEventListener('mouseleave', () => this.onMouseUp());

        // Touch support
        this.domElement.addEventListener('touchstart', (e) => this.onTouchStart(e));
        this.domElement.addEventListener('touchmove', (e) => this.onTouchMove(e));
        this.domElement.addEventListener('touchend', () => this.onMouseUp());
      }

      onMouseDown(e) {
        this.isDragging = true;
        this.previousMouseX = e.clientX;
        this.previousMouseY = e.clientY;
      }

      onMouseMove(e) {
        if (!this.isDragging) return;

        const deltaX = e.clientX - this.previousMouseX;
        const deltaY = e.clientY - this.previousMouseY;

        this.targetRotationY += deltaX * 0.005;
        this.targetRotationX += deltaY * 0.005;

        // Clamp vertical rotation
        this.targetRotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, this.targetRotationX));

        this.previousMouseX = e.clientX;
        this.previousMouseY = e.clientY;
      }

      onTouchStart(e) {
        if (e.touches.length === 1) {
          this.isDragging = true;
          this.previousMouseX = e.touches[0].clientX;
          this.previousMouseY = e.touches[0].clientY;
        }
      }

      onTouchMove(e) {
        if (!this.isDragging || e.touches.length !== 1) return;
        e.preventDefault();

        const deltaX = e.touches[0].clientX - this.previousMouseX;
        const deltaY = e.touches[0].clientY - this.previousMouseY;

        this.targetRotationY += deltaX * 0.005;
        this.targetRotationX += deltaY * 0.005;

        this.targetRotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, this.targetRotationX));

        this.previousMouseX = e.touches[0].clientX;
        this.previousMouseY = e.touches[0].clientY;
      }

      onMouseUp() {
        this.isDragging = false;
      }

      update() {
        if (this.autoRotate && !this.isDragging) {
          this.targetRotationY += 0.003 * this.autoRotateSpeed;
        }

        // Smooth interpolation
        this.rotationX += (this.targetRotationX - this.rotationX) * 0.05;
        this.rotationY += (this.targetRotationY - this.rotationY) * 0.05;

        return { x: this.rotationX, y: this.rotationY };
      }

      reset() {
        this.targetRotationX = 0;
        this.targetRotationY = 0;
      }
    }
  </script>

  <script>
    // Scene setup
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();

    // Camera
    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.z = 3;

    // Renderer
    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    // Controls
    const controls = new SimpleOrbitControls(camera, renderer.domElement);

    // Sphere
    let sphere;

    // Video texture
    const video = document.createElement('video');
    video.src = 'butterfly.MP4';
    video.loop = true;
    video.muted = true;
    video.playsInline = true;
    video.crossOrigin = 'anonymous';

    video.addEventListener('loadeddata', () => {
      document.getElementById('loading').style.display = 'none';
      video.play();
    });

    video.addEventListener('error', (e) => {
      console.error('Error loading video:', e);
      document.getElementById('loading').textContent = 'Error loading video';
    });

    // Create video texture
    const videoTexture = new THREE.VideoTexture(video);
    videoTexture.minFilter = THREE.LinearFilter;
    videoTexture.magFilter = THREE.LinearFilter;
    videoTexture.generateMipmaps = false;

    // Create sphere geometry (higher detail)
    const geometry = new THREE.SphereGeometry(1, 128, 128);

    // Create material with video texture
    const material = new THREE.MeshStandardMaterial({
      map: videoTexture,
      roughness: 0.3,
      metalness: 0.0
    });

    // Create mesh
    sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);

    // Start loading
    video.load();

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 3, 5);
    scene.add(directionalLight);

    // Add a subtle rim light
    const rimLight = new THREE.DirectionalLight(0xffffff, 0.3);
    rimLight.position.set(-5, 0, -5);
    scene.add(rimLight);

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);

      const rotation = controls.update();

      if (sphere) {
        sphere.rotation.x = rotation.x;
        sphere.rotation.y = rotation.y;
      }

      renderer.render(scene, camera);
    }
    animate();

    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Control functions
    function toggleAutoRotate() {
      controls.autoRotate = !controls.autoRotate;
    }

    function resetView() {
      controls.reset();
    }
  </script>
</body>
</html>
