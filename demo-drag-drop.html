<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drag & Drop Shapes - Quiz Template</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/drag-drop.css">
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <style>
    body {
      background: rgb(209, 253, 145);
    }

    /* Remove white container */
    .content-card {
      background: transparent;
      box-shadow: none;
    }

    .content-card-inner {
      background: transparent;
    }
    /* Modal styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: white;
      padding: 30px;
      border-radius: 16px;
      max-width: 400px;
      margin: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .modal h2 {
      margin: 0 0 15px 0;
      font-size: 22px;
    }

    .modal p {
      margin: 0 0 10px 0;
      line-height: 1.6;
    }

    .modal-close {
      margin-top: 20px;
      padding: 10px 24px;
      background: #333;
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Help bar clickable */
    .help-item {
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .help-item:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    .help-item.active {
      background: rgba(0, 0, 0, 0.1);
    }

    /* Help button with Lottie */
    .btn-help {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn-help lottie-player {
      pointer-events: none;
    }

    /* Try Again button */
    .btn-try-again {
      background: #FF9800;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 25px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    .btn-try-again:hover {
      background: #F57C00;
      transform: scale(1.05);
    }

    /* Next button styling - circular arrow */
    .btn-next {
      background: #4CAF50;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, background 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .btn-next:hover {
      background: #43A047;
      transform: scale(1.1);
    }

    .btn-next svg {
      stroke: white;
    }

    /* Success animation */
    @keyframes celebrate {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.1) rotate(-5deg); }
      75% { transform: scale(1.1) rotate(5deg); }
    }

    .celebrate {
      animation: celebrate 0.5s ease-in-out;
    }

    /* Hint system - tooltip style like word-match */
    .draggable-item.dimmed {
      opacity: 0.3;
      transition: opacity 0.3s;
    }

    .draggable-item.hint-active {
      position: relative;
      z-index: 50;
      transform: scale(1.15);
      box-shadow: 0 0 30px rgba(255, 193, 7, 0.8), 0 0 60px rgba(255, 193, 7, 0.4);
      border: 3px solid #FFC107;
      border-radius: 12px;
    }

    .hint-tooltip {
      position: absolute;
      bottom: -85px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      white-space: normal;
      text-align: center;
      z-index: 60;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      min-width: 180px;
      max-width: 250px;
    }

    .hint-tooltip::before {
      content: '';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      border: 10px solid transparent;
      border-bottom-color: #333;
      border-top: none;
    }

    /* Progress Bar with Compass */
    .progress-container {
      position: relative;
      width: calc(100% - 40px);
      height: 24px;
      margin: 20px auto;
    }

    .progress-track {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 16px;
      background: #3a3a3a;
      border-radius: 8px;
      transform: translateY(-50%);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #5E58F9 0%, #EFA1D5 100%);
      border-radius: 8px;
      transition: width 0.5s ease-out;
    }

    .compass-container {
      position: absolute;
      top: 50%;
      left: 0%;
      transform: translate(-50%, -50%);
      transition: left 0.5s ease-out;
      z-index: 10;
    }

    .compass {
      width: 44px;
      height: 44px;
      background: white;
      border: 2px solid #333;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .compass-dot {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #333;
      border-radius: 50%;
    }

    .compass-dot.top { top: 3px; left: 50%; transform: translateX(-50%); }
    .compass-dot.bottom { bottom: 3px; left: 50%; transform: translateX(-50%); }
    .compass-dot.left { left: 3px; top: 50%; transform: translateY(-50%); }
    .compass-dot.right { right: 3px; top: 50%; transform: translateY(-50%); }

    .compass-diamond {
      z-index: 5;
      position: relative;
    }

    .compass-diamond svg {
      width: 28px;
      height: 8px;
      display: block;
    }

    /* Mobile responsive */
    @media (max-width: 600px) {
      .help-item {
        padding: 12px 16px;
      }
      .drop-zones {
        gap: 10px;
      }
      .drop-zone svg {
        width: 90px;
        height: 165px;
      }
      .drop-zone-label {
        top: 45px;
        font-size: 12px;
      }
      .drop-zone-items {
        top: 60px;
        left: 50%;
        transform: translateX(-50%);
        width: 70px;
        height: 90px;
      }
    }
  </style>
</head>

  <script src="js/drag-drop.js"></script>
  <script>
    // ==========================================
    // Audio Player (Vonnie Voice)
    // ==========================================
    let currentAudio = null;
    function playAudio(src, onEnd) {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
      currentAudio = new Audio(src);
      if (onEnd) currentAudio.onended = onEnd;
      currentAudio.play();
      return currentAudio;
    }

    // ==========================================
    // Compass Rotation
    // ==========================================
    let compassRotation = 0;
    let spinSpeed = 120;
    const slowSpeed = 120;
    const fastSpeed = 720;
    let lastTime = performance.now();
    let slowDownTimer = null;

    function spinCompass(currentTime) {
      const delta = (currentTime - lastTime) / 1000;
      lastTime = currentTime;
      compassRotation += spinSpeed * delta;
      compassRotation %= 360;
      const compassDiamond = document.querySelector('.compass-diamond');
      if (compassDiamond) {
        compassDiamond.style.transform = `rotate(${compassRotation}deg)`;
      }
      requestAnimationFrame(spinCompass);
    }
    requestAnimationFrame(spinCompass);

    function updateCompass(percentage, animate = false) {
      const compassContainer = document.getElementById('compass-container');
      const progressFill = document.getElementById('progress-fill');

      if (animate) {
        if (slowDownTimer) clearTimeout(slowDownTimer);
        spinSpeed = fastSpeed;
        slowDownTimer = setTimeout(() => {
          spinSpeed = slowSpeed;
        }, 500);
      }

      progressFill.style.width = percentage + '%';
      compassContainer.style.left = percentage + '%';
    }

    // Correct answers: which zone each shape belongs to
    const correctAnswers = {
      'square': '4',
      'triangle': '3',
      'rectangle': '4',
      'trapezoid': '4',
      'pentagon': '5',
      'diamond1': '4',
      'diamond2': '4',
      'hexagon': '6'
    };

    // Initialize drag and drop
    const sorter = new DragDropZone('#shape-sorter', {
      correctAnswers: correctAnswers,
      onDrop: (itemId, zoneId, item, zone) => {
        console.log(`Dropped ${itemId} into zone ${zoneId}`);
      },
      onComplete: (placements) => {
        console.log('All items placed:', placements);
      }
    });

    // Check answers
    const btnCheck = document.getElementById('btn-check');
    const feedback = document.getElementById('feedback');
    const feedbackBadge = document.getElementById('feedback-badge');
    const btnTryAgain = document.getElementById('btn-try-again');
    const btnNext = document.getElementById('btn-next');

    btnCheck.addEventListener('click', () => {
      const result = sorter.checkAnswers();

      feedback.style.display = 'flex';
      feedbackBadge.classList.remove('correct', 'incorrect');

      const correctCount = Object.values(result.results).filter(r => r.isCorrect).length;
      const totalCount = Object.keys(result.results).length;

      if (result.allCorrect) {
        feedbackBadge.classList.add('correct');
        feedbackBadge.innerHTML = '&#127881; Awesome! All shapes sorted correctly!';
        sorter.disable();
        btnCheck.style.display = 'none';
        btnTryAgain.style.display = 'none';
        btnNext.style.display = 'flex';
        updateCompass(100, true);
