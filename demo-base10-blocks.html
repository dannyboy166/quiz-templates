<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base 10 Blocks - Quiz Template</title>
  <link rel="stylesheet" href="css/base.css">
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <style>
    body {
      background: #FFE280;
    }

    /* Remove the big white container */
    .content-card {
      background: transparent;
      box-shadow: none;
    }

    .content-card-inner {
      background: transparent;
    }

    /* Modal styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: white;
      padding: 30px;
      border-radius: 16px;
      max-width: 400px;
      margin: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .modal h2 {
      margin: 0 0 15px 0;
      font-size: 22px;
    }

    .modal p {
      margin: 0 0 10px 0;
      line-height: 1.6;
    }

    .modal-close {
      margin-top: 20px;
      padding: 10px 24px;
      background: #333;
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Help bar clickable */
    .help-item {
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .help-item:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    .help-item.active {
      background: rgba(0, 0, 0, 0.1);
    }

    /* Help button with Lottie */
    .btn-help {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn-help lottie-player {
      pointer-events: none;
    }

    /* Try Again button */
    .btn-try-again {
      background: #FF9800;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 25px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    .btn-try-again:hover {
      background: #F57C00;
      transform: scale(1.05);
    }

    /* Next button styling - circular arrow */
    .btn-next {
      background: #4CAF50;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, background 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .btn-next:hover {
      background: #43A047;
      transform: scale(1.1);
    }

    .btn-next svg {
      stroke: white;
    }

    /* Success animation */
    @keyframes celebrate {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.1) rotate(-5deg); }
      75% { transform: scale(1.1) rotate(5deg); }
    }

    .celebrate {
      animation: celebrate 0.5s ease-in-out;
    }

    /* Main game layout - side by side */
    .game-layout {
      display: flex;
      gap: 40px;
      align-items: center;
    }

    .game-layout .blocks-area {
      flex: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .game-layout .blocks-container {
      width: 100%;
    }

    .game-layout .answer-panel {
      flex: 1;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    .game-layout .answer-panel .answer-input {
      margin-bottom: 15px;
    }

    .game-layout .answer-panel .btn-check-answer {
      width: 100%;
      max-width: none;
    }

    @media (max-width: 800px) {
      .game-layout {
        flex-direction: column;
        align-items: center;
      }
      .game-layout .blocks-area {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .game-layout .answer-panel {
        width: 100%;
        max-width: 400px;
      }
      /* Stack block groups horizontally but wrap, centered */
      .blocks-container {
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 20px;
        padding: 20px 10px;
      }
      .hundreds-group {
        width: auto;
        justify-content: center;
      }
      .tens-group {
        max-width: 180px;
        justify-content: center;
      }
      .ones-group {
        max-width: 120px;
        justify-content: center;
      }
    }

    @media (max-width: 500px) {
      /* Make blocks smaller on very small screens */
      .blocks-container {
        gap: 15px;
        padding: 15px 5px;
      }
      .tens-group svg {
        width: 22px;
        height: 120px;
      }
      .ones-group svg {
        width: 32px;
        height: 40px;
      }
      .hundreds-group svg {
        width: 140px;
        height: 95px;
      }
      .tens-group {
        max-width: 140px;
      }
      .ones-group {
        max-width: 100px;
      }
    }

    /* Blocks display area */
    .blocks-container {
      display: flex;
      gap: 40px;
      justify-content: center;
      align-items: flex-end;
      padding: 30px;
      min-height: 250px;
    }

    .hundreds-group {
      position: relative;
      width: 180px;
      display: flex;
      align-items: flex-end;
    }

    .tens-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: flex-end;
      max-width: 170px;
      justify-content: center;
    }

    .ones-group {
      display: flex;
      flex-wrap: wrap-reverse;
      gap: 6px;
      max-width: 100px;
      align-content: flex-start;
      justify-content: center;
    }

    /* Difficulty selector */
    .difficulty-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 15px;
      padding: 0 10px;
    }

    .difficulty-btn {
      padding: 8px 16px;
      border: 2px solid #ddd;
      border-radius: 20px;
      background: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    @media (max-width: 400px) {
      .difficulty-btn {
        padding: 6px 12px;
        font-size: 12px;
      }
    }

    .difficulty-btn:hover {
      border-color: #667eea;
    }

    .difficulty-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    /* Hints row - separate from blocks */
    .hints-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      align-items: center;
      padding: 15px 10px 0 10px;
      min-height: 0;
    }

    @media (max-width: 500px) {
      .hints-row {
        gap: 10px;
      }
      .hint-slot.hundreds,
      .hint-slot.tens,
      .hint-slot.ones {
        width: auto;
        min-width: auto;
      }
      .hint-box {
        padding: 10px 15px;
      }
    }

    /* Hint slot - matches width of block group above */
    .hint-slot {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hint-slot.hundreds {
      width: 180px;
    }

    .hint-slot.tens {
      min-width: 100px;
    }

    .hint-slot.ones {
      min-width: 80px;
    }

    /* Plus signs between hints */
    .hint-plus {
      display: none;
      font-size: 28px;
      font-weight: 700;
      color: #666;
    }

    .hint-plus.show {
      display: block;
    }


    .hint-box {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 15px 25px;
      border-radius: 12px;
      color: white;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      animation: hintPop 0.3s ease-out;
    }

    .hint-box.show {
      display: flex;
    }

    .hint-box-number {
      font-size: 36px;
      line-height: 1;
    }

    .hint-box-label {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .hint-box.hundreds {
      background: linear-gradient(135deg, #3498DB, #2980B9);
    }

    .hint-box.tens {
      background: linear-gradient(135deg, #E74C3C, #C0392B);
    }

    .hint-box.ones {
      background: linear-gradient(135deg, #F5A623, #E8940F);
    }


    @keyframes hintPop {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Progress Bar with Compass */
    .progress-container {
      position: relative;
      width: calc(100% - 40px);
      height: 24px;
      margin: 20px auto;
    }

    .progress-track {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 16px;
      background: #3a3a3a;
      border-radius: 8px;
      transform: translateY(-50%);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #5E58F9 0%, #EFA1D5 100%);
      border-radius: 8px;
      transition: width 0.5s ease-out;
    }

    .compass-container {
      position: absolute;
      top: 50%;
      left: 0%;
      transform: translate(-50%, -50%);
      transition: left 0.5s ease-out;
      z-index: 10;
    }

    .compass {
      width: 44px;
      height: 44px;
      background: white;
      border: 2px solid #333;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .compass-dot {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #333;
      border-radius: 50%;
    }

    .compass-dot.top { top: 3px; left: 50%; transform: translateX(-50%); }
    .compass-dot.bottom { bottom: 3px; left: 50%; transform: translateX(-50%); }
    .compass-dot.left { left: 3px; top: 50%; transform: translateY(-50%); }
    .compass-dot.right { right: 3px; top: 50%; transform: translateY(-50%); }

    .compass-diamond {
      z-index: 5;
      position: relative;
    }

    .compass-diamond svg {
      width: 28px;
      height: 8px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="quiz-container">
    <!-- Header -->
    <header class="quiz-header">
      <button class="btn-back" onclick="window.location='index.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to Home
      </button>

      <div class="user-profile">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=student" alt="Student Avatar" class="user-avatar">
      </div>

      <button class="btn-help" id="header-help">
        <lottie-player
          id="help-lottie"
          background="transparent"
          speed="1"
          style="width: 28px; height: 28px;"
          loop
          autoplay
        ></lottie-player>
        Help
      </button>
    </header>

    <!-- Progress Bar -->
    <div class="progress-container">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="compass-container" id="compass-container">
        <div class="compass">
          <div class="compass-dot top"></div>
          <div class="compass-dot bottom"></div>
          <div class="compass-dot left"></div>
          <div class="compass-dot right"></div>
          <div class="compass-diamond">
            <svg viewBox="0 0 28 8">
              <polygon points="0,4 10,0 14,4 10,8" fill="#EFA1D5" stroke="#333" stroke-width="0.5"/>
              <polygon points="28,4 18,0 14,4 18,8" fill="#5E58F9" stroke="#333" stroke-width="0.5"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Question Meta -->
    <div class="question-meta">
      <span class="badge">MATH</span>
      <span class="question-progress" id="question-progress">Question 1 of 5</span>
    </div>

    <!-- Question Title -->
    <div class="question-title">
      <h1>How many blocks are there?</h1>
    </div>

    <!-- Help Bar -->
    <div class="help-bar">
      <div class="help-item" id="btn-read-aloud">
        <span style="font-weight: 530; font-size: 15px;">Read Aloud</span>
        <span class="help-item-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg></span>
      </div>
      <span class="help-item-line"></span>
      <div class="help-item" id="btn-get-help">
        <span style="font-weight: 530; font-size: 15px;">Get Help</span>
        <span class="help-item-icon">?</span>
      </div>
      <span class="help-item-line"></span>
      <div class="help-item" id="btn-get-hint">
        <span style="font-weight: 530; font-size: 15px;">Get Hint</span>
        <span class="help-item-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 6h12v2H6V6zm0 3h12v2H6V9zm0 3h8v2H6v-2z"/></svg></span>
      </div>
    </div>

    <!-- Help Modal -->
    <div class="modal-overlay" id="help-modal">
      <div class="modal">
        <div style="font-size: 40px; text-align: center; margin-bottom: 10px;">&#129518;</div>
        <h2 style="text-align: center;">Counting Base-10 Blocks!</h2>
        <div style="background: #FFF9E6; padding: 15px; border-radius: 12px; margin: 15px 0;">
          <p style="margin: 8px 0;"><strong style="color: #3498DB;">Blue flat</strong> = 100 blocks</p>
          <p style="margin: 8px 0;"><strong style="color: #E74C3C;">Red rod</strong> = 10 blocks</p>
          <p style="margin: 8px 0;"><strong style="color: #F5A623;">Orange cube</strong> = 1 block</p>
        </div>
        <p style="text-align: center; font-size: 15px;">Count the hundreds, tens, and ones, then add them together!</p>
        <button class="modal-close" id="close-help">I'm ready! &#127775;</button>
      </div>
    </div>


    <!-- Difficulty Selector -->
    <div class="difficulty-selector">
      <button class="difficulty-btn active" data-min="1" data-max="20">Easy (1-20)</button>
      <button class="difficulty-btn" data-min="1" data-max="100">Medium (1-100)</button>
      <button class="difficulty-btn" data-min="100" data-max="999">Hard (100-999)</button>
    </div>

    <!-- Content Card -->
    <div class="content-card">
      <div class="content-card-inner">
        <div class="game-layout">
          <!-- Blocks on left with hints below -->
          <div class="blocks-area">
            <div class="blocks-container" id="blocks-container">
              <!-- Blocks will be generated here -->
            </div>

            <!-- Hints row - separate from blocks -->
            <div class="hints-row" id="hints-row">
              <!-- Hints will be generated here -->
            </div>
          </div>

          <!-- Answer panel on right -->
          <div class="answer-panel">
            <h3 style="margin-bottom: 15px; font-size: 20px;">Your Answer</h3>
            <input type="number" class="answer-input" id="answer" placeholder="?" autocomplete="off" min="1" max="999">
            <button class="btn-check-answer" id="btn-check">Check Answer</button>

            <!-- Feedback -->
            <div class="feedback" id="feedback" style="display: none; margin-top: 15px;">
              <span class="feedback-badge" id="feedback-badge"></span>
            </div>
            <div style="margin-top: 15px;">
              <button class="btn-try-again" id="btn-try-again" style="display: none;">
                Try Again &#128260;
              </button>
              <button class="btn-next" id="btn-next" style="display: none;" title="Next Question">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Compass rotation state
    let rotation = 0;
    let spinSpeed = 120;
    const slowSpeed = 120;
    const fastSpeed = 720;
    let lastTime = performance.now();
    let slowDownTimer = null;

    function spinCompass(currentTime) {
      const delta = (currentTime - lastTime) / 1000;
      lastTime = currentTime;
      rotation += spinSpeed * delta;
      rotation %= 360;
      const compassDiamond = document.querySelector('.compass-diamond');
      if (compassDiamond) {
        compassDiamond.style.transform = `rotate(${rotation}deg)`;
      }
      requestAnimationFrame(spinCompass);
    }
    requestAnimationFrame(spinCompass);

    function updateCompass(percentage, animate = false, backwards = false) {
      const compassContainer = document.getElementById('compass-container');
      const progressFill = document.getElementById('progress-fill');

      if (animate) {
        if (slowDownTimer) clearTimeout(slowDownTimer);
        spinSpeed = backwards ? -fastSpeed : fastSpeed;
        slowDownTimer = setTimeout(() => {
          spinSpeed = slowSpeed;
        }, 500);
      }

      progressFill.style.width = percentage + '%';
      compassContainer.style.left = percentage + '%';
    }

    // ==========================================
    // SVG Block Generators
    // ==========================================

    function createSingleBlock() {
      return `<svg width="40" height="48" viewBox="0 0 100 120">
        <polygon points="50,10 90,30 50,50 10,30" fill="#F5A623" stroke="#333" stroke-width="1.5"/>
        <polygon points="10,30 50,50 50,100 10,80" fill="#E8940F" stroke="#333" stroke-width="1.5"/>
        <polygon points="50,50 90,30 90,80 50,100" fill="#D4820A" stroke="#333" stroke-width="1.5"/>
      </svg>`;
    }

    function createTenBlock() {
      return `<svg width="28" height="150" viewBox="0 0 100 520">
        <polygon points="50,10 90,30 50,50 10,30" fill="#E74C3C" stroke="#333" stroke-width="1.5"/>
        <polygon points="10,30 50,50 50,500 10,480" fill="#C0392B" stroke="#333" stroke-width="1.5"/>
        <polygon points="50,50 90,30 90,480 50,500" fill="#A93226" stroke="#333" stroke-width="1.5"/>
        <line x1="10" y1="75" x2="50" y2="95" stroke="#333" stroke-width="0.8"/>
        <line x1="10" y1="120" x2="50" y2="140" stroke="#333" stroke-width="0.8"/>
        <line x1="10" y1="165" x2="50" y2="185" stroke="#333" stroke-width="0.8"/>
        <line x1="10" y1="210" x2="50" y2="230" stroke="#333" stroke-width="0.8"/>
        <line x1="10" y1="255" x2="50" y2="275" stroke="#333" stroke-width="0.8"/>
        <line x1="10" y1="300" x2="50" y2="320" stroke="#333" stroke-width="0.8"/>
        <line x1="10" y1="345" x2="50" y2="365" stroke="#333" stroke-width="0.8"/>
        <line x1="10" y1="390" x2="50" y2="410" stroke="#333" stroke-width="0.8"/>
        <line x1="10" y1="435" x2="50" y2="455" stroke="#333" stroke-width="0.8"/>
        <line x1="50" y1="95" x2="90" y2="75" stroke="#333" stroke-width="0.8"/>
        <line x1="50" y1="140" x2="90" y2="120" stroke="#333" stroke-width="0.8"/>
        <line x1="50" y1="185" x2="90" y2="165" stroke="#333" stroke-width="0.8"/>
        <line x1="50" y1="230" x2="90" y2="210" stroke="#333" stroke-width="0.8"/>
        <line x1="50" y1="275" x2="90" y2="255" stroke="#333" stroke-width="0.8"/>
        <line x1="50" y1="320" x2="90" y2="300" stroke="#333" stroke-width="0.8"/>
        <line x1="50" y1="365" x2="90" y2="345" stroke="#333" stroke-width="0.8"/>
        <line x1="50" y1="410" x2="90" y2="390" stroke="#333" stroke-width="0.8"/>
        <line x1="50" y1="455" x2="90" y2="435" stroke="#333" stroke-width="0.8"/>
      </svg>`;
    }

    function createHundredBlock() {
      // Simplified hundred block - 10x10 grid
      let svg = `<svg width="180" height="120" viewBox="0 0 520 320">
        <!-- Top face - simplified as single polygon with grid lines -->
        <polygon points="260,10 500,130 260,250 20,130" fill="#3498DB" stroke="#333" stroke-width="1.5"/>`;

      // Add grid lines on top face
      for (let i = 1; i < 10; i++) {
        // Lines going one direction
        const x1 = 260 - (i * 24);
        const y1 = 10 + (i * 12);
        const x2 = 500 - (i * 24);
        const y2 = 130 + (i * 12);
        svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#333" stroke-width="0.5"/>`;

        // Lines going other direction
        const x3 = 260 + (i * 24);
        const y3 = 10 + (i * 12);
        const x4 = 20 + (i * 24);
        const y4 = 130 + (i * 12);
        svg += `<line x1="${x3}" y1="${y3}" x2="${x4}" y2="${y4}" stroke="#333" stroke-width="0.5"/>`;
      }

      // Left face
      svg += `<polygon points="20,130 260,250 260,280 20,160" fill="#2980B9" stroke="#333" stroke-width="1.5"/>`;

      // Right face
      svg += `<polygon points="260,250 500,130 500,160 260,280" fill="#1F618D" stroke="#333" stroke-width="1.5"/>`;

      svg += `</svg>`;
      return svg;
    }

    // ==========================================
    // Game State
    // ==========================================
    let currentNumber = 0;
    let currentQuestion = 1;
    let totalQuestions = 5;
    let minNumber = 1;
    let maxNumber = 20;
    let score = 0;

    // ==========================================
    // Generate Question
    // ==========================================
    function generateQuestion() {
      // Generate random number based on difficulty (between min and max)
      currentNumber = Math.floor(Math.random() * (maxNumber - minNumber + 1)) + minNumber;

      // Break down into hundreds, tens, ones
      const hundreds = Math.floor(currentNumber / 100);
      const tens = Math.floor((currentNumber % 100) / 10);
      const ones = currentNumber % 10;

      // Build the blocks display
      const container = document.getElementById('blocks-container');
      const hintsContainer = document.getElementById('hints-row');
      let blocksHtml = '';
      let hintsHtml = '';

      // Track which groups exist for plus sign logic
      const hasHundreds = hundreds > 0;
      const hasTens = tens > 0;
      const hasOnes = ones > 0;

      // Add hundreds blocks (stacked vertically on top of each other)
      if (hasHundreds) {
        const stackHeight = 120 + (hundreds - 1) * 30; // base height + stacking offset
        blocksHtml += `<div class="hundreds-group" style="height: ${stackHeight}px;">`;
        for (let i = 0; i < hundreds; i++) {
          // Stack upward - first block at bottom, each one higher and in front
          const offsetFromBottom = i * 30;
          blocksHtml += `<div style="position: absolute; left: 0; bottom: ${offsetFromBottom}px; z-index: ${i};">${createHundredBlock()}</div>`;
        }
        blocksHtml += '</div>';

        // Hint for hundreds
        hintsHtml += `<div class="hint-slot hundreds">
          <div class="hint-box hundreds" id="hint-hundreds">
            <span class="hint-box-number">${hundreds}</span>
            <span class="hint-box-label">Hundreds</span>
          </div>
        </div>`;

        // Plus after hundreds (if tens or ones follow)
        if (hasTens || hasOnes) {
          hintsHtml += '<span class="hint-plus" id="hint-plus-after-hundreds">+</span>';
        }
      }

      // Add tens blocks
      if (hasTens) {
        blocksHtml += '<div class="tens-group">';
        for (let i = 0; i < tens; i++) {
          blocksHtml += createTenBlock();
        }
        blocksHtml += '</div>';

        // Hint for tens
        hintsHtml += `<div class="hint-slot tens">
          <div class="hint-box tens" id="hint-tens">
            <span class="hint-box-number">${tens}</span>
            <span class="hint-box-label">Tens</span>
          </div>
        </div>`;

        // Plus after tens (if ones follow)
        if (hasOnes) {
          hintsHtml += '<span class="hint-plus" id="hint-plus-after-tens">+</span>';
        }
      }

      // Add ones blocks
      if (hasOnes) {
        blocksHtml += '<div class="ones-group">';
        for (let i = 0; i < ones; i++) {
          blocksHtml += createSingleBlock();
        }
        blocksHtml += '</div>';

        // Hint for ones
        hintsHtml += `<div class="hint-slot ones">
          <div class="hint-box ones" id="hint-ones">
            <span class="hint-box-number">${ones}</span>
            <span class="hint-box-label">Ones</span>
          </div>
        </div>`;
      }

      container.innerHTML = blocksHtml;
      hintsContainer.innerHTML = hintsHtml;

      // Update question progress
      document.getElementById('question-progress').textContent = `Question ${currentQuestion} of ${totalQuestions}`;
      updateCompass(((currentQuestion - 1) / totalQuestions) * 100, currentQuestion > 1);

      // Reset input and feedback
      const answerInput = document.getElementById('answer');
      answerInput.value = '';
      answerInput.disabled = false;
      answerInput.classList.remove('correct', 'incorrect');
      document.getElementById('feedback').style.display = 'none';
      document.getElementById('btn-check').style.display = 'block';
      document.getElementById('btn-try-again').style.display = 'none';
      document.getElementById('btn-next').style.display = 'none';

      // Reset hints
      updateHints();
    }

    // Hints - Progressive colored boxes
    // ==========================================
    let hintIndex = 0;
    let hintOrder = []; // Which hints to show in order

    function updateHints() {
      const hundreds = Math.floor(currentNumber / 100);
      const tens = Math.floor((currentNumber % 100) / 10);
      const ones = currentNumber % 10;

      // Build the order of hints based on what's present
      hintOrder = [];
      if (hundreds > 0) hintOrder.push('hundreds');
      if (tens > 0) hintOrder.push('tens');
      if (ones > 0) hintOrder.push('ones');

      // Reset hint display
      resetHintBoxes();
    }

    function resetHintBoxes() {
      // Reset all hints that exist in the DOM
      const hintsRow = document.getElementById('hints-row');
      if (hintsRow) {
        hintsRow.querySelectorAll('.hint-box').forEach(el => el.classList.remove('show'));
        hintsRow.querySelectorAll('.hint-plus').forEach(el => el.classList.remove('show'));
      }
      hintIndex = 0;
    }

    function showNextHint() {
      if (hintIndex >= hintOrder.length) {
        // All hints shown, cycle back
        hintIndex = 0;
        return;
      }

      const hintType = hintOrder[hintIndex];
      const hintBox = document.getElementById(`hint-${hintType}`);
      if (hintBox) hintBox.classList.add('show');

      // Play audio for this hint type
      playAudio(`audio/base10-blocks/hint-${hintType}.mp3`);

      // Show the plus sign that comes BEFORE this hint (after the previous one)
      if (hintIndex > 0) {
        const prevHint = hintOrder[hintIndex - 1];
        const plusAfterPrev = document.getElementById(`hint-plus-after-${prevHint}`);
        if (plusAfterPrev) plusAfterPrev.classList.add('show');
      }

      hintIndex++;
    }

    // Check Answer
    // ==========================================
    const answerInput = document.getElementById('answer');
    const btnCheck = document.getElementById('btn-check');
    const feedback = document.getElementById('feedback');
    const feedbackBadge = document.getElementById('feedback-badge');
    const btnTryAgain = document.getElementById('btn-try-again');
    const btnNext = document.getElementById('btn-next');

    btnCheck.addEventListener('click', () => {
      const userAnswer = parseInt(answerInput.value.trim());
      const isCorrect = userAnswer === currentNumber;

      feedback.style.display = 'flex';
      answerInput.classList.remove('correct', 'incorrect');
      answerInput.classList.add(isCorrect ? 'correct' : 'incorrect');

      feedbackBadge.classList.remove('correct', 'incorrect');
      feedbackBadge.classList.add(isCorrect ? 'correct' : 'incorrect');

      if (isCorrect) {
        feedbackBadge.innerHTML = '&#127881; Awesome! That\'s right!';
        playAudio('audio/base10-blocks/feedback-correct.mp3');
        answerInput.disabled = true;
        btnCheck.style.display = 'none';
        btnTryAgain.style.display = 'none';
        btnNext.style.display = 'flex';
        score++;
        updateCompass((currentQuestion / totalQuestions) * 100, true);
        document.querySelector('.content-card').classList.add('celebrate');
        setTimeout(() => {
          document.querySelector('.content-card').classList.remove('celebrate');
        }, 500);
      } else {
        feedbackBadge.innerHTML = '&#128170; Not quite - give it another go!';
        playAudio('audio/base10-blocks/feedback-incorrect.mp3');
        btnTryAgain.style.display = 'block';
        btnNext.style.display = 'none';
      }
    });

    // Allow Enter key to submit
    answerInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        btnCheck.click();
      }
    });

    // Try Again
    btnTryAgain.addEventListener('click', () => {
      answerInput.value = '';
      answerInput.classList.remove('correct', 'incorrect');
      answerInput.disabled = false;
      answerInput.focus();
      feedback.style.display = 'none';
      btnTryAgain.style.display = 'none';
    });

    // Next Question
    btnNext.addEventListener('click', () => {
      currentQuestion++;
      if (currentQuestion > totalQuestions) {
        // Quiz complete - show results or restart
        alert(`Quiz Complete! You got ${score} out of ${totalQuestions} correct!`);
        currentQuestion = 1;
        score = 0;
      }
      generateQuestion();
    });

    // ==========================================
    // Difficulty Selection
    // ==========================================
    document.querySelectorAll('.difficulty-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        minNumber = parseInt(btn.dataset.min);
        maxNumber = parseInt(btn.dataset.max);
        currentQuestion = 1;
        score = 0;
        generateQuestion();
      });
    });

    // ==========================================
    // Audio Player (Vonnie Voice)
    // ==========================================
    let currentAudio = null;

    function playAudio(src, onEnd) {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
      currentAudio = new Audio(src);
      if (onEnd) currentAudio.onended = onEnd;
      currentAudio.play();
      return currentAudio;
    }

    // ==========================================
    // Read Aloud
    // ==========================================
    const btnReadAloud = document.getElementById('btn-read-aloud');

    btnReadAloud.addEventListener('click', () => {
      btnReadAloud.classList.add('active');
      playAudio('audio/base10-blocks/question.mp3', () => {
        btnReadAloud.classList.remove('active');
      });
    });

    // ==========================================
    // Get Help
    // ==========================================
    const btnGetHelp = document.getElementById('btn-get-help');
    const helpModal = document.getElementById('help-modal');
    const closeHelp = document.getElementById('close-help');

    btnGetHelp.addEventListener('click', () => {
      helpModal.classList.add('active');
    });

    document.getElementById('header-help').addEventListener('click', () => {
      helpModal.classList.add('active');
    });

    closeHelp.addEventListener('click', () => {
      helpModal.classList.remove('active');
    });

    helpModal.addEventListener('click', (e) => {
      if (e.target === helpModal) helpModal.classList.remove('active');
    });

    // ==========================================
    // Get Hint - Progressive colored boxes
    // ==========================================
    const btnGetHint = document.getElementById('btn-get-hint');

    btnGetHint.addEventListener('click', () => {
      showNextHint();
    });

    // Initialize
    // ==========================================
    generateQuestion();
